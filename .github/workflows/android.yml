name: Build Web to APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova & Build Android Package
      run: |
        npm install -g cordova
        cordova create build-android com.ehsaas.health HealthApp
        cd build-android
        cordova platform add android
        rm -rf www/*
        cd ..
        
        # Safe copy for clean layout
        cp index.html build-android/www/
        if [ -f icon.png ]; then
          cp icon.png build-android/www/icon.png
        fi
        if [ -f config.xml ]; then
          cp config.xml build-android/config.xml
        fi
        
        cd build-android
        cordova build android --debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: health-app-release
        path: build-android/platforms/android/app/build/outputs/apk/debug/app-debug.apk
