name: Build Web to APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova & Build Android Package
      run: |
        npm install -g cordova
        
        # Fresh Cordova Project Creation
        cordova create build-android com.ehsaas.health EhsaasHealth
        cd build-android
        cordova platform add android
        
        # Clear default files and copy your main index.html
        rm -rf www/*
        cp ../index.html www/index.html
        
        # Inject custom logo if you uploaded icon.png
        if [ -f ../icon.png ]; then
          cp ../icon.png www/icon.png
        fi
        
        # Inject config.xml if exists
        if [ -f ../config.xml ]; then
          cp ../config.xml config.xml
        fi
        
        # Final Build
        cordova build android --debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: health-app-release
        path: build-android/platforms/android/app/build/outputs/apk/debug/app-debug.apk
